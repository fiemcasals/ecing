name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ ! -d "/root/ecing/.git" ]; then
              rm -rf /root/ecing
              git clone https://github.com/fiemcasals/ecing.git /root/ecing
            fi
            cd /root/ecing
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker compose up -d --build

            
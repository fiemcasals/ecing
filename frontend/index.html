<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AR Geolocation</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js con soporte GPS -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
        AFRAME.registerComponent('look-at-camera', {
            tick: function () {
                var camera = this.el.sceneEl.camera;
                if (camera) {
                    var cameraPos = new THREE.Vector3();
                    cameraPos.setFromMatrixPosition(camera.matrixWorld);
                    this.el.object3D.lookAt(new THREE.Vector3(cameraPos.x, this.el.object3D.position.y, cameraPos.z));
                }
            }
        });

        AFRAME.registerComponent('clickhandler', {
            init: function () {
                this.el.addEventListener('click', () => {
                    const id = this.el.getAttribute('data-id');
                    window.dispatchEvent(new CustomEvent('poi-clicked', { detail: id }));
                });
            }
        });
    </script>
  </head>
  <body style="margin: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
